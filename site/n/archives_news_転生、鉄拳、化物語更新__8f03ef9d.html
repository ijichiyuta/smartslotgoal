  <h1>転生、鉄拳、化物語更新</h1><div class="date">2026-01-18</div>
  <div class="content"><p class="wp-block-paragraph"><a href="https://suroschool.jp/archives/machine/%e5%8c%97%e6%96%97%e3%81%ae%e6%8b%b3-%e8%bb%a2%e7%94%9f%e3%81%ae%e7%ab%a02" target="_blank" rel="noreferrer noopener">転生</a>　ゾーン毎のフェイク前兆発生率、100G毎のランプ示唆について解析が出たので「その他」の項目に表を追加しました。</p>



<p class="wp-block-paragraph"><a href="https://suroschool.jp/archives/machine/%e9%89%84%e6%8b%b36" target="_blank" rel="noreferrer noopener">鉄拳</a>　設定変更後、上位AT後1スルーからが甘いため、積極派は0GからAT当選までにしました。</p>



<p class="wp-block-paragraph"><a href="https://suroschool.jp/archives/machine/%e5%8c%96%e7%89%a9%e8%aa%9e" target="_blank" rel="noreferrer noopener">化物語</a>　一撃大量獲得後の50Gフォローの狙い目を削除しました。実践データの前回獲得枚数別で見ても機械割に影響が無く、差枚別でも影響が無い感じになりました。</p>
