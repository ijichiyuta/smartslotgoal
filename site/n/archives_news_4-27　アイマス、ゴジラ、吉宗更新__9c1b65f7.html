  <h1>4/27　アイマス、ゴジラ、吉宗更新</h1><div class="date">2025-04-26</div>
  <div class="content"><p class="wp-block-paragraph">アイマス　リセットが辛くなりボーダー上げました。特殊キューブ狙い、超ミリオンセブンチャンスの履歴等を追加しました。</p>



<p class="wp-block-paragraph">ゴジラ　CZ間狙いがかなり辛くなったためボーダー上げました。上位後のAT後狙いを追加しました。</p>



<p class="wp-block-paragraph">吉宗　天井狙いのボーダー調整しました。1G連後の見分け方を更新しました。</p>
